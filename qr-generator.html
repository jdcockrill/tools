<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator</title>
  <style>
    :root {
      --bg: #fff;
      --fg: #111;
      --muted: #666;
      --border: #ccc;
      --surface: #f5f5f5;
      --link: #005ea2;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111;
        --fg: #eee;
        --muted: #999;
        --border: #444;
        --surface: #1e1e1e;
        --link: #58a6ff;
      }
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      font-size: 1rem;
      line-height: 1.6;
      margin: 2rem auto;
      max-width: 860px;
      padding: 0 1rem;
      background: var(--bg);
      color: var(--fg);
    }
    h1 { font-size: 1.4rem; margin: 0.25rem 0 0; }
    a.back { color: var(--link); font-size: 0.9rem; text-decoration: none; }
    a.back:hover { text-decoration: underline; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 2rem;
      margin-top: 1.5rem;
      align-items: start;
    }
    @media (max-width: 640px) {
      .layout { grid-template-columns: 1fr; }
      .preview { order: -1; }
    }

    .controls { display: flex; flex-direction: column; gap: 1.25rem; }

    .field-label {
      display: block;
      font-weight: 600;
      font-size: 0.875rem;
      margin-bottom: 0.3rem;
    }
    .sublabel { font-weight: normal; color: var(--muted); }

    input[type="text"] {
      width: 100%;
      padding: 0.45rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      color: var(--fg);
      font-size: 0.95rem;
    }
    input[type="text"]:focus { outline: 2px solid var(--link); outline-offset: 1px; }

    button {
      padding: 0.3rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      color: var(--fg);
      cursor: pointer;
      font-size: 0.82rem;
      line-height: 1.4;
    }
    button:hover { opacity: 0.75; }

    .btn-group { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .btn-group button.active {
      background: var(--link);
      color: #fff;
      border-color: var(--link);
    }

    .logo-row { display: flex; align-items: center; gap: 0.5rem; }
    .logo-name {
      font-size: 0.85rem;
      color: var(--muted);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .range-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 0.4rem;
    }
    .range-row label { font-size: 0.82rem; color: var(--muted); white-space: nowrap; min-width: 90px; }
    .range-row input[type="range"] { flex: 1; accent-color: var(--link); }
    .range-val { font-size: 0.82rem; color: var(--muted); min-width: 36px; text-align: right; }

    .check-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; font-size: 0.85rem; }
    .check-row input[type="checkbox"] { accent-color: var(--link); width: 15px; height: 15px; }

    .swatch-row { display: flex; align-items: center; gap: 0.35rem; flex-wrap: wrap; }
    .swatch {
      width: 26px; height: 26px;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      outline: 2px solid transparent;
      outline-offset: 2px;
      padding: 0;
    }
    .swatch.active { outline-color: var(--fg); }
    input[type="color"] {
      width: 26px; height: 26px;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 2px;
      cursor: pointer;
      background: none;
    }

    .preview { display: flex; flex-direction: column; gap: 0.75rem; }
    #qr-preview {
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      line-height: 0;
      width: 300px; height: 300px;
    }
    #qr-preview img { width: 300px; height: 300px; display: block; }

    .dl-btn {
      width: 300px;
      padding: 0.55rem 1rem;
      border: none;
      border-radius: 4px;
      background: var(--link);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    .dl-btn:hover { opacity: 0.85; }

    hr { border: none; border-top: 1px solid var(--border); margin: 0; }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Tools</a>
  <h1>QR Code Generator</h1>

  <div class="layout">
    <div class="controls">

      <div>
        <label class="field-label" for="qr-text">Content</label>
        <input type="text" id="qr-text" placeholder="https://example.com" value="https://example.com">
      </div>

      <hr>

      <div>
        <span class="field-label">Dot style</span>
        <div class="btn-group" id="bg-dot-style"></div>
      </div>

      <div>
        <span class="field-label">Finder pattern style</span>
        <div class="btn-group" id="bg-finder-style"></div>
      </div>

      <hr>

      <div>
        <label class="field-label">Logo <span class="sublabel">(optional, square image)</span></label>
        <div class="logo-row">
          <button onclick="document.getElementById('logo-input').click()">Choose image</button>
          <span class="logo-name" id="logo-name">No logo</span>
          <button id="clear-logo-btn" style="display:none" onclick="clearLogo()">✕</button>
        </div>
        <input type="file" id="logo-input" accept="image/*" style="display:none">

        <div class="range-row">
          <label for="img-size">Logo size</label>
          <input type="range" id="img-size" min="0.1" max="0.45" step="0.05" value="0.25">
          <span class="range-val" id="img-size-val">25%</span>
        </div>
        <div class="check-row">
          <input type="checkbox" id="hide-bg-dots" checked>
          <label for="hide-bg-dots">Hide dots behind logo</label>
        </div>
      </div>

      <hr>

      <div>
        <span class="field-label">Background color</span>
        <div class="swatch-row" id="swatches-bg"></div>
      </div>

      <div>
        <span class="field-label">Foreground color</span>
        <div class="swatch-row" id="swatches-fg"></div>
      </div>

      <div>
        <span class="field-label">Accent color <span class="sublabel">(finder pattern rings)</span></span>
        <div class="swatch-row" id="swatches-accent"></div>
      </div>

    </div>

    <div class="preview">
      <div id="qr-preview"></div>
      <button class="dl-btn" onclick="download()">Download PNG</button>
    </div>
  </div>

  <p style="margin-top:2rem;font-size:0.8rem;color:var(--muted)">QR matrix by <a href="https://github.com/kazuhikoarase/qrcode-generator" style="color:var(--link)">qrcode-generator</a></p>

  <canvas id="qr-canvas" style="display:none"></canvas>

  <script src="https://unpkg.com/qrcode-generator@1.4.4/qrcode.js"></script>
  <script>
    const RENDER_SIZE = 600;

    const state = {
      text:               'https://example.com',
      logo:               null,
      _logoImg:           null,
      bg:                 '#ffffff',
      fg:                 '#111111',
      accent:             '#111111',
      dotStyle:           'rounded',   // 'classic' | 'rounded' | 'square' | 'dots'
      finderStyle:        'rounded',   // 'rounded' | 'square'
      imageSize:          0.25,
      hideBackgroundDots: true,
    };

    const canvas = document.getElementById('qr-canvas');
    canvas.width  = RENDER_SIZE;
    canvas.height = RENDER_SIZE;
    const ctx = canvas.getContext('2d');

    // ── Drawing helpers ───────────────────────────────────────────────────────

    function fillRoundRect(x, y, w, h, r) {
      r = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y,     x + w, y + r,     r);
      ctx.lineTo(x + w, y + h - r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h);
      ctx.arcTo(x,     y + h, x,     y + h - r, r);
      ctx.lineTo(x, y + r);
      ctx.arcTo(x,     y,     x + r, y,          r);
      ctx.closePath();
      ctx.fill();
    }

    function drawDot(x, y, size) {
      if (state.dotStyle === 'dots') {
        ctx.beginPath();
        ctx.arc(x + size / 2, y + size / 2, size / 2, 0, Math.PI * 2);
        ctx.fill();
      } else if (state.dotStyle === 'rounded') {
        fillRoundRect(x, y, size, size, size * 0.28);
      } else {
        // classic and square: plain rect
        ctx.fillRect(x, y, size, size);
      }
    }

    function drawFinderPattern(row, col, cellSize) {
      const x    = col * cellSize;
      const y    = row * cellSize;
      const size = 7 * cellSize;
      const gap  = cellSize * 0.08;
      const r    = state.finderStyle === 'rounded' ? size * 0.12 : 0;
      const ri   = state.finderStyle === 'rounded' ? size * 0.07 : 0;

      // Outer square
      ctx.fillStyle = state.accent;
      fillRoundRect(x + gap, y + gap, size - gap * 2, size - gap * 2, r);

      // Background ring (hollow)
      ctx.fillStyle = state.bg;
      fillRoundRect(x + cellSize, y + cellSize, 5 * cellSize, 5 * cellSize, ri);

      // Inner dot (3×3)
      ctx.fillStyle = state.accent;
      fillRoundRect(
        x + 2 * cellSize + gap,
        y + 2 * cellSize + gap,
        3 * cellSize - gap * 2,
        3 * cellSize - gap * 2,
        ri
      );
    }

    // ── Render ────────────────────────────────────────────────────────────────

    function render() {
      const qr = qrcode(0, 'H');
      try {
        qr.addData(state.text || ' ');
        qr.make();
      } catch (e) {
        return; // data too long
      }

      const count    = qr.getModuleCount();
      const cellSize = RENDER_SIZE / count;
      const gap      = state.dotStyle === 'classic' ? 0 : cellSize * 0.08;
      const dotSize  = cellSize - gap * 2;

      // Finder pattern zones (top-left corners)
      const finders = [
        [0,         0        ],
        [0,         count - 7],
        [count - 7, 0        ],
      ];

      function inFinder(r, c) {
        for (const [fr, fc] of finders) {
          if (r >= fr && r < fr + 7 && c >= fc && c < fc + 7) return true;
        }
        return false;
      }

      // Logo hidden zone (cells to skip)
      let hiddenBox = null;
      if (state.logo && state.hideBackgroundDots) {
        const logoSize = RENDER_SIZE * state.imageSize;
        const ox = (RENDER_SIZE - logoSize) / 2;
        const oy = (RENDER_SIZE - logoSize) / 2;
        hiddenBox = {
          r0: Math.floor(oy / cellSize),
          r1: Math.ceil((oy + logoSize) / cellSize),
          c0: Math.floor(ox / cellSize),
          c1: Math.ceil((ox + logoSize) / cellSize),
        };
      }

      // Background
      ctx.fillStyle = state.bg;
      ctx.fillRect(0, 0, RENDER_SIZE, RENDER_SIZE);

      // Data dots
      ctx.fillStyle = state.fg;
      for (let r = 0; r < count; r++) {
        for (let c = 0; c < count; c++) {
          if (inFinder(r, c)) continue;
          if (!qr.isDark(r, c)) continue;
          if (hiddenBox && r >= hiddenBox.r0 && r < hiddenBox.r1 && c >= hiddenBox.c0 && c < hiddenBox.c1) continue;
          drawDot(c * cellSize + gap, r * cellSize + gap, dotSize);
        }
      }

      // Finder patterns
      for (const [fr, fc] of finders) {
        drawFinderPattern(fr, fc, cellSize);
      }

      // Logo
      if (state.logo && state._logoImg) {
        const logoSize = RENDER_SIZE * state.imageSize;
        const lx = (RENDER_SIZE - logoSize) / 2;
        const ly = (RENDER_SIZE - logoSize) / 2;
        ctx.drawImage(state._logoImg, lx, ly, logoSize, logoSize);
      }

      // Update visible preview
      const preview = document.getElementById('qr-preview');
      let img = preview.querySelector('img');
      if (!img) { img = document.createElement('img'); preview.appendChild(img); }
      img.src = canvas.toDataURL();
    }

    // ── Button groups ─────────────────────────────────────────────────────────

    function buildBtnGroup(containerId, stateKey, options) {
      const container = document.getElementById(containerId);
      options.forEach(({ value, label }) => {
        const btn = document.createElement('button');
        btn.textContent = label;
        if (state[stateKey] === value) btn.classList.add('active');
        btn.addEventListener('click', () => {
          container.querySelectorAll('button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          state[stateKey] = value;
          render();
        });
        container.appendChild(btn);
      });
    }

    buildBtnGroup('bg-dot-style', 'dotStyle', [
      { value: 'classic', label: 'Classic' },
      { value: 'rounded', label: 'Rounded square' },
      { value: 'square',  label: 'Square' },
      { value: 'dots',    label: 'Dots' },
    ]);

    buildBtnGroup('bg-finder-style', 'finderStyle', [
      { value: 'rounded', label: 'Rounded' },
      { value: 'square',  label: 'Square' },
    ]);

    // ── Swatches ──────────────────────────────────────────────────────────────

    const PRESETS = [
      { color: '#ffffff', border: '#ccc' },
      { color: '#111111', border: '#111' },
      { color: '#1a56db', border: '#1a56db' },
      { color: '#e02424', border: '#e02424' },
      { color: '#057a55', border: '#057a55' },
      { color: '#d97706', border: '#d97706' },
    ];

    function buildSwatches(containerId, stateKey, defaultColor) {
      const container = document.getElementById(containerId);
      PRESETS.forEach(({ color, border }) => {
        const btn = document.createElement('button');
        btn.className = 'swatch' + (color === defaultColor ? ' active' : '');
        btn.style.background = color;
        btn.style.borderColor = border;
        btn.title = color;
        btn.addEventListener('click', () => {
          container.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
          btn.classList.add('active');
          container.querySelector('input[type="color"]').value = color;
          state[stateKey] = color;
          render();
        });
        container.appendChild(btn);
      });
      const picker = document.createElement('input');
      picker.type = 'color';
      picker.value = defaultColor;
      picker.addEventListener('input', () => {
        container.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
        state[stateKey] = picker.value;
        render();
      });
      container.appendChild(picker);
    }

    buildSwatches('swatches-bg',     'bg',     '#ffffff');
    buildSwatches('swatches-fg',     'fg',     '#111111');
    buildSwatches('swatches-accent', 'accent', '#111111');

    // ── Text input ────────────────────────────────────────────────────────────

    let debounce;
    document.getElementById('qr-text').addEventListener('input', e => {
      state.text = e.target.value;
      clearTimeout(debounce);
      debounce = setTimeout(render, 300);
    });

    // ── Logo ──────────────────────────────────────────────────────────────────

    document.getElementById('logo-input').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        state.logo = ev.target.result;
        const img = new Image();
        img.onload = () => { state._logoImg = img; render(); };
        img.src = state.logo;
        document.getElementById('logo-name').textContent = file.name;
        document.getElementById('clear-logo-btn').style.display = '';
      };
      reader.readAsDataURL(file);
    });

    function clearLogo() {
      state.logo = null;
      state._logoImg = null;
      document.getElementById('logo-name').textContent = 'No logo';
      document.getElementById('clear-logo-btn').style.display = 'none';
      document.getElementById('logo-input').value = '';
      render();
    }

    document.getElementById('img-size').addEventListener('input', e => {
      state.imageSize = parseFloat(e.target.value);
      document.getElementById('img-size-val').textContent = Math.round(state.imageSize * 100) + '%';
      render();
    });

    document.getElementById('hide-bg-dots').addEventListener('change', e => {
      state.hideBackgroundDots = e.target.checked;
      render();
    });

    // ── Download ──────────────────────────────────────────────────────────────

    function download() {
      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a   = document.createElement('a');
        a.href     = url;
        a.download = 'qr-code.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 'image/png');
    }

    // ── Initial render ────────────────────────────────────────────────────────

    render();
  </script>
</body>
</html>
